    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">

    <script src="script.js"></script>
</head>

<body>
    <section class="global-hero-bg"></section>
    <header>
        <div class="top-bar">
            <nav>
                <img src="img/mat_idvisual/whitelogosemfundo.png" alt="logo" class="logo">
                <!---<h1>
                    <span class="fonte1">Posici</span><span class="fonte2">onados</span>
                </h1>-->
                <ul class="top-menu">
                    <li><a href="index.html" class="active">Início</a></li>
                    <li><a href="eventos.html">Eventos</a></li>
                    <li><a href="loja.html">Loja</a></li>
                    <li><a href="devocionais.html">Devocionais</a></li>
                    <li><a href="sobrenos.html">Sobre Nós</a></li>
                    <li><a href="#" id="abrir-login"><ion-icon name="person-sharp"></ion-icon> Login</a></li>
                </ul>
                <button class="menu-hamburguer" id="menu-hamburguer" aria-label="Abrir menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
            </nav>
        </div>
    </header>

    <div class="barra-lateral">
        <a href="https://www.instagram.com/reviverjovens/" target="_blank" class="icone">
            <ion-icon name="logo-instagram"></ion-icon>
        </a>
        <a href="galeria.html" class="icone">
            <ion-icon name="images-outline"></ion-icon>
        </a>
    </div>

    <section class="hero-banner">
        <div class="hero-content">
            <h1>Bem-vindo ao Posicionados</h1>
            <h4>Jovens vivendo o propósito de Deus</h4>
            <p>Venha fazer parte desse movimento!</p>
        </div>
    </section>
    
    <div class="login-overlay" id="login-overlay"></div>
    <div id="login-popup" class="login-popup">
        <button class="login-popup-fechar" id="login-popup-fechar" aria-label="Fechar">&#x2715;</button>
        <form class="login-form" id="form-login">
            <h3>Login</h3>
            <div class="login-popup-divider"></div>
            <p class="login-subtitulo">Entre na sua conta</p>
            <input type="email" id="login-email" placeholder="E-mail" required>
            <input type="password" id="login-senha" placeholder="Senha" required>
            <button type="submit">Entrar</button>
            <p id="mensagem-login"></p>
            <p class="cadastre-link">Não tem cadastro? <a href="cadastro.html">Cadastre-se</a></p>
        </form>
    </div>

    <script>
    document.getElementById('form-login').addEventListener('submit', async function(e) {
        e.preventDefault();

        const mensagem = document.getElementById('mensagem-login');

        const dados = {
            email: document.getElementById('login-email').value,
            senha: document.getElementById('login-senha').value
        };

        try {
            const resposta = await fetch('http://localhost:3000/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            const resultado = await resposta.json();

            if (resposta.ok) {
                localStorage.setItem('token', resultado.token);
                mensagem.style.color = '#f3caa8';
                mensagem.textContent = 'Login realizado com sucesso!';
                document.getElementById('form-login').reset();
            } else {
                mensagem.style.color = '#ff6b6b';
                mensagem.textContent = resultado.erro;
            }
        } catch (err) {
            mensagem.style.color = '#ff6b6b';
            mensagem.textContent = 'Erro ao conectar com o servidor.';
        }
    });
</script>

</body>
</html>
