name: Supabase Heartbeat

on:
  schedule:
    - cron: "0 12 */4 * *" # Roda a cada 4 dias ao meio-dia UTC
  workflow_dispatch:        # Permite rodar manualmente pelo GitHub

jobs:
  heartbeat:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase
        run: |
          RESPONSE=$(curl -s -w "\nSTATUS:%{http_code}" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/")

          STATUS=$(echo "$RESPONSE" | grep "STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "STATUS:")

          echo "Status HTTP: $STATUS"
          echo "Resposta: $BODY"

          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "✅ Heartbeat bem-sucedido!"
          else
            echo "❌ Falha no heartbeat. Status: $STATUS"
            exit 1
          fi